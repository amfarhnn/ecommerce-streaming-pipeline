services:
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  producer:
    build: .
    command: python src/producer.py
    env_file:
      - .env
    depends_on:
      - redpanda

  consumer:
    build: .
    command: python src/consumer.py
    env_file:
      - .env
    depends_on:
      - redpanda

